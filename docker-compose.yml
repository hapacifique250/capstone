version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: admission-db
    environment:
      POSTGRES_USER: admission_user
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: admission_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admission_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Express Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: admission-backend
    environment:
      DATABASE_URL: postgresql://admission_user:secure_password_change_me@postgres:5432/admission_system
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRY: 7d
      PORT: 3000
      NODE_ENV: production
      ML_SERVICE_URL: http://ml-service:5000
      CORS_ORIGIN: http://localhost:5173,http://localhost:3000
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  # Python ML Service
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: admission-ml
    environment:
      FLASK_ENV: production
      FLASK_APP: app.py
    ports:
      - "5000:5000"
    volumes:
      - ./ml-service/models:/app/models

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: admission-frontend
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_ML_SERVICE_URL: http://localhost:5000
    ports:
      - "3000:5173"
    volumes:
      - ./src:/app/src
    command: npm run dev

  # Adminer (Database UI - optional)
  adminer:
    image: adminer
    container_name: admission-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  default:
    name: admission-network
